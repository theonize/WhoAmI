<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline — Who Am I?</title>
    <meta name="theme-color" content="#4338ca" />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #faf7f0;
        color: #1f2430;
        font-family: system-ui, sans-serif;
        text-align: center;
        padding: 2rem;
      }
      .card {
        max-width: 28rem;
        background: #fff;
        border: 1px solid #e8e1d3;
        border-radius: 16px;
        padding: 2rem;
        box-shadow: 0 10px 30px rgba(20, 20, 40, 0.08);
      }
      h1 { font-family: Georgia, serif; margin: 0 0 0.5rem; }
      p { color: #5b6472; }
      a {
        display: inline-block;
        margin-top: 1rem;
        padding: 0.6rem 1.2rem;
        background: linear-gradient(135deg, #4338ca, #7e22ce);
        color: #fff;
        border-radius: 999px;
        text-decoration: none;
        font-weight: 600;
      }
      @media (prefers-color-scheme: dark) {
        body { background: #0f1117; color: #e7eaf1; }
        .card { background: #161b24; border-color: #29303f; }
        p { color: #9aa3b2; }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You're offline</h1>
      <p>This page hasn't been saved for offline reading yet. Reconnect, then open it once — after that it will be available offline.</p>
      <a href="./">Try again</a>
    </div>
  </body>
</html>
