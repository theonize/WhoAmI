name: Deploy PWA to GitHub Pages

# Publishes the static PWA (no build step) to GitHub Pages.
#
# One-time setup in the repository:
#   Settings → Pages → Build and deployment → Source: "GitHub Actions"
#
# After that, every push to `main` deploys. You can also run it by hand from
# the Actions tab (workflow_dispatch) — handy while it lives on a feature branch.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the deploy job to publish to Pages via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent deploy; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate PWA icons
        run: node scripts/generate-icons.mjs

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload the repo root — this is a static site with no build step.
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
